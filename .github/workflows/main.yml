name: Add Domain to Blocklist
on:
  issues:
    types: [opened]

jobs:
  add-to-list:
    if: contains(github.event.issue.title, 'block')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Append domain to list
        run: |
          DOMAIN=$(echo "${{ github.event.issue.body }}" | xargs)
          # 構文を固定して追記
          echo "||${DOMAIN}^" >> list.txt
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add list.txt
          git commit -m "Add ${DOMAIN} to blocklist"
          git push

      - name: Close Issue
        run: |
          gh issue close ${{ github.event.issue.number }} --comment "Added to blocklist and locked."
          gh issue lock ${{ github.event.issue.number }} --reason "resolved"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
